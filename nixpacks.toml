[phases.setup]
aptPkgs = [
  "fontconfig",
  "fonts-noto-core",
  "fonts-noto-cjk",
  "fonts-noto-extra"
]

[phases.build]
cmds = [
  "mkdir -p /app/fonts",
  "python -c \"import pathlib, urllib.request; target = pathlib.Path('/app/fonts/NotoSansCJKsc-Regular.otf'); target.parent.mkdir(parents=True, exist_ok=True); urllib.request.urlretrieve('https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf', target) if not target.exists() else None; assert target.exists() and target.stat().st_size > 0, 'Vendored subtitle font download failed'\"",
  "fc-cache -f -v >/dev/null 2>&1 || true"
]